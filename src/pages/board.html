<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory/Board</title>
    <script src="../scripts/classes/settings.ts"></script>
</head>
<body onload="initBoardPage()" class="">
    <main id="board_page" class="board_page">
        <div class="board_content">
            <div class="header">
                <div id="header_wrapper" class="header_wrapper">
                    <div class="score">
                        <div id="first_player_id" class="score_player">
                            <img src="" alt="first player icon">
                            <span id="first_player_score_id">-</span>                 
                        </div>
                        <div id="second_player_id" class="score_player">
                            <img src="" alt="second player icon">
                            <span id="second_player_score_id">-</span>
                        </div>
                    </div>
    
                    <div class="current_player">
                        <span>Current player:</span>
                        <div id="current_player_img_id"></div>
                    </div>
                    <button class="exit_btn">
                        <div id="exit_btn_img_id"></div>
                        <span>Exit game</span>
                    </button>
                </div>
            </div>
            <div class="board board_size_16">
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
            </div>
        </div>
        <div class="overlay d_none">
            <div class="exit_dialog">
                <span class="text">Are your sure you want to quit the game?</span>
                <div>
                    <button class="back_to_game_btn">Back to game</button>
                    <a class="exit_link" href="">Exit game</a>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="../main.ts"></script>
</body>
</html>
