<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory/Board</title>
</head>
<body>
    <main class="board_page">
        <div class="board_content">
            <div class="header">
                <div class="header_wrapper">
                    <div class="score">
                        <div class="blue_player_score">
                            <img src="/assets/img/player-blue-theme1.png" alt="">
                            <span>Blue 6</span>                        
                        </div>
                        <div class="orange_player_score">
                            <img src="/assets/img/player-orange-theme1.png" alt="">
                            <span>Orange 2</span>                        
                        </div>
                    </div>
    
                    <div class="current_player">
                        <span>Current player:</span>
                        <img src="/assets/img/player-blue-theme1.png" alt="">
                    </div>
                    <button class="exit_btn">
                        <img src="/assets/img/exit.png" alt="">
                        <span>Exit game</span>
                    </button>
                </div>
            </div>
            <div class="board board_size_16">
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
            </div>
        </div>
        <div class="overlay d_none">
            <div class="exit_dialog">
                <span>Are your sure you want to quit the game?</span>
                <div>
                    <button class="back_to_game_btn">Back to game</button>
                    <a class="exit_link" href="">Exit game</a>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="../main.ts"></script>
</body>
</html>
