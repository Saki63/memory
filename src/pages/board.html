<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory/Board</title>
    <script src="../scripts/classes/settings.ts"></script>
</head>
<body onload="initBoardPage()">
    <main class="board_page board_page_code_vibes">
        <div class="board_content">
            <div class="header">
                <div class="header_wrapper header_wrapper_code_vibes">
                    <div class="score score_code_vibes">
                        <div class="score_player player_score_blue">
                            <!-- images change -->
                            <img src="/assets/img/player-blue-theme1.png" alt="">
                            <span>Blue 6</span> <!-- score change -->                  
                        </div>
                        <div class="score_player player_score_orange">
                            <!-- images change -->
                            <img src="/assets/img/player-orange-theme1.png" alt="">
                            <span>Orange 2</span>   <!-- score change -->
                        </div>
                    </div>
    
                    <div class="current_player current_player_code_vibes">
                        <span>Current player:</span>
                        <img src="/assets/img/player-blue-theme1.png" alt="">
                    </div>
                    <button class="exit_btn exit_btn_code_vibes">
                        <img src="/assets/img/exit.png" alt="">
                        <span>Exit game</span>
                    </button>
                </div>
            </div>
            <div class="board board_size_16">
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
                <div class="card"><img src="/assets/img/backside-card-theme1.png" alt=""></div>
            </div>
        </div>
        <div class="overlay d_none">
            <div class="exit_dialog exit_dialog_code_vibes">
                <span class="text_code_vibes">Are your sure you want to quit the game?</span>
                <div>
                    <button class="back_to_game_btn back_to_game_btn_code_vibes">Back to game</button>
                    <a class="exit_link exit_link_code_vibes" href="">Exit game</a>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="../main.ts"></script>
</body>
</html>
