<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory/Board</title>
    <script type="module" src="/src/scripts/board.ts"></script>
</head>
<body>
    <main class="board_page">
        <div class="board_content">
            <header class="board_header">
                <div id="header_wrapper" class="header_wrapper">
                    <div id="score" class="score"></div>
                    <div class="current_player">
                        <span>Current player:</span>
                        <div id="current-player-img-id"></div>
                    </div>
                    <div class="btn_placeholder"></div>
                    <button id="exit-btn-id" class="exit_btn exit_btn--theme">
                        <div id="exit-btn-img-id"></div>
                        <span>Exit game</span>
                    </button>
                </div>
            </header>
            <div id="board-id" class="board">
            </div>
        </div>
        <div id="exit-dialog-overlay" class="overlay exit_dialog_overlay d_none">
            <div id="exit-dialog-id" class="exit_dialog">
                <span class="exit_dialog__text">Are your sure you want to quit the game?</span>
                <div class="exit_dialog__options">
                    <button id="back-to-game-btn" class="back_to_game_btn">Back to game</button>
                    <a class="exit_game_btn" href="/memory/">Exit game</a>
                </div>
            </div>
        </div>
        <div id="game-over-overlay" class="overlay game_over_overlay d_none">
            <div class="game_over_content">
                <img class="game_over_content__lettering" id="game-over-lettering" src="" alt="Game over">
                <span class="game_over_content__label">Final score</span>
                <div id="final-score" class="score"></div>
            </div>
        </div>
        <div id="winner-overlay" class="overlay winner_overlay d_none">
            <div class="winner_content">
                <img class="winner_content__confetti" id="confetti-img" src="" alt="Confetti">
                <span id="start-text">The winner is</span>
                <h2 id="winner-announcement">-</h2>
                <div class="winner_img_wrapper">
                    <img id="winner-img" class="winner_img" src="" alt="Icon of the first player">
                    <img id="tie-img" class="winner_img d_none" src="" alt="Icon of the second player">                    
                </div>
                <a class="home_btn home_btn_style" id="home-btn" href="/memory/">Back to start</a>
            </div>
        </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
